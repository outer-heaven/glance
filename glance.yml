# =============================================================================
# GLANCE DASHBOARD — Melbourne Home Butler
# Pages: Home | Markets | Gaming | Entertainment
# =============================================================================

server:
  port: 8080

theme:
  background-color: 222 14 10
  primary-color: 210 80 60
  positive-color: 145 60 50
  negative-color: 0 72 51
  contrast-multiplier: 1.2

pages:

# =============================================================================
# PAGE 1: HOME
# =============================================================================
  - name: Home
    head-widgets:
      - type: search
        autofocus: true
        search-engine: google
        new-tab: true
        hide-header: true
        bangs:
          - title: YouTube
            shortcut: "!yt"
            url: https://www.youtube.com/results?search_query={QUERY}
          - title: Google Maps
            shortcut: "!m"
            url: https://www.google.com/maps/search/{QUERY}
          - title: Wikipedia
            shortcut: "!w"
            url: https://en.wikipedia.org/wiki/Special:Search?search={QUERY}

    columns:
      - size: small
        widgets:
          - type: html
            title: Internet Speed
            source: |
              <div style="text-align:center; padding: 8px 0;">
                <p style="font-size:0.85rem; opacity:0.7; margin-bottom:12px;">Tap below for a speed test</p>
                <a href="https://fast.com" target="_blank"
                   style="display:inline-block; padding:10px 22px; background:var(--color-primary); color:#fff; border-radius:6px; text-decoration:none; font-weight:600; font-size:0.95rem;">
                  ⚡ Run Speed Test
                </a>
              </div>
          - type: calendar
            first-day-of-week: monday
          - type: clock
            hour-format: 24h
            timezones:
              - timezone: America/New_York
                label: New York & Boston
              - timezone: Asia/Kolkata
                label: Bengaluru
              - timezone: Asia/Kuala_Lumpur
                label: Foshan & Kuala Lumpur
              - timezone: Australia/Melbourne
                label: Melbourne

      - size: full
        widgets:
          - type: weather
            title: Melbourne Weather
            location: Melbourne, Victoria, Australia
            units: metric
            hour-format: 24h
          - type: custom-api
            title: 7-Day Forecast — Melbourne
            cache: 3h
            url: https://api.open-meteo.com/v1/forecast?latitude=-37.8462917&longitude=145.2524768&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Australia%2FMelbourne&wind_speed_unit=kmh&forecast_days=7
            template: |
              {{ $times  := .JSON.Array "daily.time" }}
              {{ $codes  := .JSON.Array "daily.weathercode" }}
              {{ $maxT   := .JSON.Array "daily.temperature_2m_max" }}
              {{ $minT   := .JSON.Array "daily.temperature_2m_min" }}
              {{ $rain   := .JSON.Array "daily.precipitation_probability_max" }}
              <div style="display:flex; flex-direction:column; gap:6px; padding:4px 0;">
                {{ range $i, $day := $times }}
                  <div style="display:flex; justify-content:space-between; align-items:center; padding:6px 10px; background:rgba(255,255,255,0.05); border-radius:6px;">
                    <span style="width:110px; font-weight:600; font-size:0.85rem;">{{ $day.String "" | parseTime "2006-01-02" | formatTime "Mon 2 Jan" }}</span>
                    <span style="width:90px; text-align:right; font-size:0.85rem;">
                      <span style="color:var(--color-primary); font-weight:600;">{{ printf "%.0f" (index $maxT $i).Float }}°</span>
                      <span style="opacity:0.55;"> / {{ printf "%.0f" (index $minT $i).Float }}°</span>
                    </span>
                  </div>
                {{ end }}
              </div>
          - type: rss
            title: Local News
            style: horizontal-cards
            limit: 8
            feeds:
              - url: https://www.abc.net.au/news/feed/51120/rss.xml
                title: ABC News
              - url: https://www.theguardian.com/au/rss
                title: Guardian Australia

      - size: small
        widgets:
          - type: rss
            title: World News
            limit: 15
            collapse-after: 8
            feeds:
              - url: https://feeds.bbci.co.uk/news/world/rss.xml
                title: BBC World
          - type: rss
            title: Technology News
            limit: 10
            feeds:
              - url: https://www.theverge.com/rss/index.xml
                title: The Verge

# =============================================================================
# PAGE 2: MARKETS
# =============================================================================
  - name: Markets
    columns:
      - size: small
        widgets:
          - type: markets
            title: ETFs
            markets:
              - symbol: VDHG.AX
                name: VDHG
              - symbol: VGS.AX
                name: VGS
              - symbol: NDQ.AX
                name: NDQ
              - symbol: SPY
                name: SPY
          - type: markets
            title: ASX — Top Movers
            sort-by: absolute-change
            markets:
              - symbol: CBA.AX
                name: CBA
              - symbol: BHP.AX
                name: BHP
              - symbol: CSL.AX
                name: CSL

      - size: full
        widgets:
          - type: rss
            title: Finance News
            style: horizontal-cards
            limit: 15
            feeds:
              - url: https://feeds.bloomberg.com/markets/news.rss
                title: Bloomberg
          - type: group
            widgets:
              - type: reddit
                title: r/AusFinance
                subreddit: AusFinance
                app-id: YOUR_REDDIT_APP_ID
                app-secret: YOUR_REDDIT_APP_SECRET
              - type: reddit
                title: r/WallStreetBets
                subreddit: wallstreetbets
                app-id: YOUR_REDDIT_APP_ID
                app-secret: YOUR_REDDIT_APP_SECRET

      - size: small
        widgets:
          - type: rss
            title: Australian Finance
            limit: 12
            feeds:
              - url: https://www.afr.com/rss
                title: AFR

# =============================================================================
# PAGE 3: GAMING
# =============================================================================
  - name: Gaming
    columns:
      - size: small
        widgets:
          - type: rss
            title: PS5 — New Releases
            style: vertical-cards
            limit: 8
            feeds:
              - url: https://feeds.ign.com/ign/all
                title: IGN
          - type: html
            title: Release Calendars
            source: |
              <div style="display:flex; flex-direction:column; gap:10px;">
                <a href="https://store.steampowered.com/explore/upcoming/" target="_blank" style="color:var(--color-primary); text-decoration:none;">🖥️ Steam — Upcoming</a>
              </div>

      - size: full
        widgets:
          - type: group
            widgets:
              - type: reddit
                title: r/PS5
                subreddit: PS5
                app-id: YOUR_REDDIT_APP_ID
                app-secret: YOUR_REDDIT_APP_SECRET
          - type: videos
            title: Gaming Videos
            style: grid-cards
            channels:
              - UCNvzD7Z-g64bPXxGzaQaa4g   # gameranx
              - UCZ7AeeVbyslLM_8-nVy2B8Q   # Skill Up

      - size: small
        widgets:
          - type: rss
            title: Gaming News
            limit: 15
            feeds:
              - url: https://kotaku.com/rss
                title: Kotaku

# =============================================================================
# PAGE 4: ENTERTAINMENT
# =============================================================================
  - name: Entertainment
    columns:
      - size: small
        widgets:
          - type: custom-api
            title: XKCD — Today's Comic
            cache: 24h
            url: https://xkcd.com/info.0.json
            template: |
              <div style="text-align:center;">
                <img src="{{ .JSON.String "img" }}" style="max-width:100%; border-radius:6px;" />
                <p>#{{ .JSON.Int "num" }} — {{ .JSON.String "safe_title" }}</p>
              </div>
          - type: rss
            title: Entertainment News
            limit: 10
            feeds:
              - url: https://variety.com/feed/
                title: Variety

      - size: full
        widgets:
          - type: custom-api
            title: 🎬 Now In Cinemas
            url: https://api.themoviedb.org/3/movie/now_playing?api_key=YOUR_TMDB_API_KEY&region=AU&language=en-AU&page=1
            template: |
              <div style="display:flex; flex-wrap:wrap; gap:12px;">
                {{ range $i, $m := .JSON.Array "results" }}
                  {{ if lt $i 12 }}
                    <div style="width:120px; text-align:center;">
                      <img src="https://image.tmdb.org/t/p/w185{{ $m.String "poster_path" }}" style="width:120px; border-radius:6px;" />
                    </div>
                  {{ end }}
                {{ end }}
              </div>
          - type: group
            widgets:
              - type: html
                title: 📍 What's On Melbourne
                source: |
                  <div style="display:flex; flex-direction:column; gap:10px;">
                    <a href="https://whatson.melbourne.vic.gov.au/things-to-do/whats-on-today" target="_blank" style="display:block; padding:10px; background:rgba(255,255,255,0.07); border-radius:8px; text-decoration:none; color:inherit;">📅 Today</a>
                  </div>

      - size: small
        widgets:
          - type: html
            title: 🎂 Celebrities Born This Week
            source: |
              <div id="celeb-container"><p style="opacity:0.5;">Loading...</p></div>
              <script> /* Script remains same as original */ </script>
          - type: rss
            title: 📰 Melbourne Event News
            feeds:
              - url: https://www.broadsheet.com.au/melbourne/feed
                title: Broadsheet
